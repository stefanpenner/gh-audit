name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Test
        run: bazel test //...

      - name: Build
        run: bazel build //...

  tla:
    name: Model-check TLA+ specs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache tla2tools.jar
        uses: actions/cache@v4
        with:
          path: tla/.tools
          key: tla2tools-v1

      # Asserts green Sound HOLDS, red/amber Sound VIOLATED,
      # bait Bait VIOLATED — see tla/run.sh header.
      - name: Model check
        run: ./tla/run.sh

  fixtures:
    name: Validate against stefanpenner/gh-audit-test-fixtures
    runs-on: ubuntu-latest
    # Advisory at first — red here won't block the PR. Flip to blocking
    # once the check has been stable for a few weeks.
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Install DuckDB CLI
        run: |
          curl -fsSL https://github.com/duckdb/duckdb/releases/latest/download/duckdb_cli-linux-amd64.zip -o /tmp/duckdb.zip
          mkdir -p "$HOME/.local/bin"
          unzip -o /tmp/duckdb.zip -d "$HOME/.local/bin"
          chmod +x "$HOME/.local/bin/duckdb"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # Build the binary with Bazel (host GCC + the static libduckdb.a)
      # and hand it to the fixtures script via GH_AUDIT_BIN.
      - name: Build gh-audit (via Bazel)
        run: bazel build //:gh-audit

      - name: Validate fixtures
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          GH_AUDIT_BIN="$PWD/$(bazel cquery --output=files //:gh-audit 2>/dev/null | head -1)"
          export GH_AUDIT_BIN
          ./scripts/test-fixtures.sh
