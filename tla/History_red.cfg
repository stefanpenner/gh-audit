\* History-blind rule: inspect only the current snapshot. A force-push that
\* orphaned commits leaves a clean-looking tree, so TLC must find the
\* undetected laundering — the reason a single-snapshot audit is unsound.
SPECIFICATION Spec
INVARIANTS TypeOK Sound
CONSTANTS
    Commits = {"c1", "c2", "c3"}
    MaxHeads = 4
    Variant = "snapshot"
