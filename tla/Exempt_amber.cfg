\* Shipped DEFAULT with a documented tradeoff: signing_policy=optional —
\* a verified signer is the sound path, but an unsigned commit that merely
\* CLAIMS an exempt author is still waived (flagged trust:forgeable-exemption).
\* Sound is VIOLATED, reachable ONLY through the unsigned-forged-author state:
\*   verified=FALSE, authorId=botid, realSigner=atk  → waived, but unsafe.
\* This is the residual assumption made explicit (progressive enhancement);
\* signing_policy=required (the green config) needs no such assumption.
