orgs:
  - name: nodejs
    repos: [node]
    branches: [main]

  - name: rails
    repos: [rails]
    branches: [main]

tokens:
  - kind: pat
    env: GITHUB_TOKEN
    scopes:
      - org: nodejs
      - org: rails

audit_rules:
  require_pr: true
  require_approval: true

sync:
  concurrency: 10
  initial_lookback_days: 30

exemptions:
  authors:
    # Matching is by immutable numeric account id (logins are display-only).
    - login: "dependabot[bot]"
      id: 49699333
    - login: "github-actions[bot]"
      id: 41898282
